<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>A-Frame: Image Targets Example</title>
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>

    <style>
.map-btn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
display: none;
  background: #e1251b;
  color: white;
  border: none;
  padding: 14px 20px;
  font-size: 16px;
  border-radius: 30px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);

  cursor: pointer;
}
</style>
</head>
<body>
  <script src="bundle.js"></script>
  <button id="mapBtn" class="map-btn" style="display: none;">
  📍 Open Directions
</button>
  <a-scene xrextras-gesture-detector landing-page xrextras-loading xrextras-runtime-error
    renderer="colorManagement:true" xrweb="disableWorldTracking: true">

    <a-assets>
      <!-- Credit to Poly by Google for the model: https://poly.google.com/view/dA5osnS0Rzj -->
      <!-- <a-asset-item id="jelly-glb" src="assets/jellyfish-model.glb"></a-asset-item> -->
      <!-- <img id="yuvraj-thumb" src="./assets/yuvraj-target-image.png"> -->
       <img id="yuvraj-thumb" src="./assets/play-button5.png">
      <video id="yuvraj-video" muted playsinline
  webkit-playsinline crossorigin="anonymous" src="assets/yuvraj-target-video.mp4#t=0.01">
      </video>
    </a-assets>

    <a-camera position="0 4 10" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

    <a-light type="ambient" intensity="1"></a-light>
      <!--  -->
    <!-- Note: "name:" must be set to the name of the image target -->
    <xrextras-named-image-target id="yuvrajTarget" name="yuvraj-target-image">
<a-entity id="videoPlane" xrextras-play-video="video: #yuvraj-video"
        geometry="primitive: plane; height: 0.75; width: 1.25;"></a-entity>
  <!-- 🎬 VIDEO PLANE -->
 

  <!-- ▶️ PLAY BUTTON -->
  <a-plane
    id="playBtn"
    class="cantap"
    width="0.3"
    height="0.3"
    position="0 0 0.02"
    material="src: #yuvraj-thumb; transparent: true">
  </a-plane>

    </xrextras-named-image-target>

    <!-- Note: "name:" must be set to the name of the image target  -->
     

  </a-scene>
<script>
 window.addEventListener('load', () => {

  const video = document.getElementById('yuvraj-video')
  const plane = document.getElementById('videoPlane')
  const btn = document.getElementById('mapBtn')
  const playBtn = document.getElementById('playBtn')

  // ▶️ TAP → PLAY VIDEO
  playBtn.addEventListener('click', () => {
    playBtn.setAttribute('visible', false)
    video.muted = false
    video.currentTime = 0

    video.play().then(() => {
      plane.setAttribute('material', 'src', '#yuvraj-video')
    })
  })

  // 🎬 VIDEO END → SHOW BUTTON
 let running = false;

  video.ontimeupdate = function () {
    var currentTime = video.currentTime; // Get the current time of the video in seconds
    var duration = video.duration; // Get the total duration of the video in seconds
    var leftTime = duration - currentTime; 
    console.log(`Time left: ${currentTime}`); // Calculate the remaining time (time left)
    if (currentTime >= 4) {
    if (!running) {
      running = true;
        btn.style.display = 'block'
        console.log('✅ Button shown at 4%')
    }
  }
}
  // 👁 IMAGE FOUND
  window.addEventListener('xrimagefound', (e) => {
    console.log('✅ XR IMAGE FOUND:', e.detail.name)
  })

  // ❌ IMAGE LOST (THIS IS THE FIX)
  window.addEventListener('xrimagelost', (e) => {
    console.log('❌ XR IMAGE LOST:', e.detail.name)
playBtn.setAttribute('visible', true)
    video.pause()
    video.muted = true
    btn.style.display = 'none'

    plane.setAttribute('material', 'src', '#yuvraj-thumb')
  })

  // 📍 BUTTON CLICK → MAP
  btn.addEventListener('click', () => {
    navigator.geolocation.getCurrentPosition((pos) => {

      const userLat = pos.coords.latitude
      const userLng = pos.coords.longitude

      const destLat = 28.585781
      const destLng = 77.311326

      window.open(
        `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${destLat},${destLng}`,
        '_blank'
      )
    })
  })

})</script>
</body>

</html>
